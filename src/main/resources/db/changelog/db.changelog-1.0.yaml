databaseChangeLog:
  - changeSet:
      id: "1"
      author: liquibase
      changes:
        - createTable:
            tableName: file_uploads
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: file_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_size
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: records_processed
                  type: int
                  constraints:
                    nullable: true
              - column:
                  name: error_message
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_file_uploads_file_name
            tableName: file_uploads
            columns:
              - column:
                  name: file_name
        - createIndex:
            indexName: idx_file_uploads_status
            tableName: file_uploads
            columns:
              - column:
                  name: status 