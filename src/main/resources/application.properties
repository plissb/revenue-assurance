# Настройки Spring Boot
spring.application.name=revenue-assurance
server.port=8080

# Настройки PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ra_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Настройки JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Настройки Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true
spring.liquibase.default-schema=public

# Настройки для ClickHouse
clickhouse.url=jdbc:clickhouse://localhost:8123/ra_analytics
clickhouse.username=default
clickhouse.password=
clickhouse.database=ra_analytics

# Настройки для мониторинга файлов
app.file-watcher.input-dir=data/input
app.file-watcher.done-dir=data/done
app.file-watcher.error-dir=data/error
app.file-watcher.file-pattern=*.csv
app.file-watcher.interval=60000
app.file-watcher.enabled=true

# Настройки для загрузки файлов
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB 