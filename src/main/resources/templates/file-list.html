<head xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
    <title id="pageTitle">Uploaded Files | Revenue Assurance</title>
    <th:block layout:fragment="headAdditions">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    </th:block>
</head>
<body>
    <div layout:fragment="content" class="container main-content">
        <!-- Add alerts here -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> <!-- Success icon -->
            <div>
                <span th:text="${success}"></span>
            </div>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">
             <i class="bi bi-exclamation-triangle-fill me-2"></i> <!-- Error icon -->
             <div>
                 <span th:text="${error}"></span>
             </div>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">List of uploaded files</h5>
                <a href="/files/upload" class="btn btn-sm btn-light">
                    <i class="bi bi-upload"></i> Upload file
                </a>
            </div>
            <div class="card-body">
                <!-- Filters and search -->
                <div class="row mb-4">
                    <div class="col-md-8">
                        <form method="get" action="/files" class="row g-2">
                            <input type="hidden" name="page" value="0">
                            <input type="hidden" name="sort" th:value="${sort}">
                            <input type="hidden" name="direction" th:value="${direction}">
                            
                            <div class="col-md-4">
                                <div class="input-group">
                                    <input type="text" class="form-control" name="search" th:value="${search}" placeholder="Search by filename">
                                    <button class="btn btn-outline-secondary" type="submit" aria-label="Search"><i class="bi bi-search"></i></button>
                                </div>
                            </div>
                            
                            <div class="col-md-3">
                                <select class="form-select" name="status" aria-label="Filter by status">
                                    <option value="">All statuses</option>
                                    <option th:each="statusOption : ${statuses}" 
                                            th:value="${statusOption}" 
                                            th:text="${statusOption}"
                                            th:selected="${statusOption == status}"></option>
                                </select>
                            </div>
                            
                            <div class="col-md-4">
                                <div class="input-group">
                                    <input type="text" class="form-control date-range" name="startDate" th:value="${startDate}" placeholder="From date">
                                    <span class="input-group-text">to</span>
                                    <input type="text" class="form-control date-range" name="endDate" th:value="${endDate}" placeholder="To date">
                                </div>
                            </div>
                            
                            <div class="col-md-1">
                                <button type="submit" class="btn btn-primary w-100" aria-label="Apply filters"><i class="bi bi-filter"></i></button>
                            </div>
                        </form>
                    </div>
                    <div class="col-md-4 text-end">
                        <a href="/files" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-repeat"></i> Reset
                        </a>
                    </div>
                </div>
                
                <!-- Files table -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-light">
                            <tr>
                                <th sortable="fileName" 
                                    th:class="${sort == 'fileName' ? (direction == 'ASC' ? 'asc' : 'desc') : ''}"
                                    th:attr="asc=${sort == 'fileName' && direction == 'ASC'}, 
                                            desc=${sort == 'fileName' && direction == 'DESC'}">
                                    <a th:href="@{/files(page=${currentPage}, size=10, sort='fileName', direction=${sort == 'fileName' && direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}">Filename</a>
                                </th>
                                <th sortable="fileSize" 
                                    th:class="${sort == 'fileSize' ? (direction == 'ASC' ? 'asc' : 'desc') : ''}"
                                    th:attr="asc=${sort == 'fileSize' && direction == 'ASC'}, 
                                            desc=${sort == 'fileSize' && direction == 'DESC'}">
                                    <a th:href="@{/files(page=${currentPage}, size=10, sort='fileSize', direction=${sort == 'fileSize' && direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}">Size</a>
                                </th>
                                <th sortable="status" 
                                    th:class="${sort == 'status' ? (direction == 'ASC' ? 'asc' : 'desc') : ''}"
                                    th:attr="asc=${sort == 'status' && direction == 'ASC'}, 
                                            desc=${sort == 'status' && direction == 'DESC'}">
                                    <a th:href="@{/files(page=${currentPage}, size=10, sort='status', direction=${sort == 'status' && direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}">Status</a>
                                </th>
                                <th sortable="recordsProcessed" 
                                    th:class="${sort == 'recordsProcessed' ? (direction == 'ASC' ? 'asc' : 'desc') : ''}"
                                    th:attr="asc=${sort == 'recordsProcessed' && direction == 'ASC'}, 
                                            desc=${sort == 'recordsProcessed' && direction == 'DESC'}">
                                    <a th:href="@{/files(page=${currentPage}, size=10, sort='recordsProcessed', direction=${sort == 'recordsProcessed' && direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}">Records</a>
                                </th>
                                <th sortable="createdAt" 
                                    th:class="${sort == 'createdAt' ? (direction == 'ASC' ? 'asc' : 'desc') : ''}"
                                    th:attr="asc=${sort == 'createdAt' && direction == 'ASC'}, 
                                            desc=${sort == 'createdAt' && direction == 'DESC'}">
                                    <a th:href="@{/files(page=${currentPage}, size=10, sort='createdAt', direction=${sort == 'createdAt' && direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}">Upload date</a>
                                </th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="file : ${filesPage}">
                                <td>
                                    <a th:href="@{/files/{id}(id=${file.id})}" th:text="${file.fileName}"></a>
                                </td>
                                <td th:text="${#numbers.formatDecimal(file.fileSize / 1024, 0, 'COMMA', 2, 'POINT')} + ' KB'"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${file.status == 'COMPLETED' ? 'bg-completed text-white' : 
                                                           (file.status == 'ERROR' ? 'bg-error text-white' : 
                                                            (file.status == 'PROCESSING' ? 'bg-processing text-white' : 
                                                             'bg-pending text-dark'))}">
                                        <i th:if="${file.status == 'COMPLETED'}" class="bi bi-check-circle me-1"></i>
                                        <i th:if="${file.status == 'ERROR'}" class="bi bi-exclamation-triangle me-1"></i>
                                        <i th:if="${file.status == 'PROCESSING'}" class="bi bi-hourglass-split me-1"></i>
                                        <i th:if="${file.status == 'PENDING'}" class="bi bi-clock me-1"></i>
                                        <span th:text="${file.status}"></span>
                                    </span>
                                </td>
                                <td th:text="${file.recordsProcessed != null ? file.recordsProcessed : '-'}"></td>
                                <td th:text="${#temporals.format(file.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/files/{id}(id=${file.id})}" class="btn btn-sm btn-outline-primary" 
                                       data-bs-toggle="tooltip" title="View details" aria-label="File details">
                                        <i class="bi bi-info-circle"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${filesPage.empty}">
                                <td colspan="6" class="text-center">No data to display</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        Showing <span th:text="${filesPage.numberOfElements}"></span> of <span th:text="${filesPage.totalElements}"></span> records
                    </div>
                    <nav th:if="${filesPage.totalPages > 1}">
                        <ul class="pagination">
                            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/files(page=0, size=10, sort=${sort}, direction=${direction}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}" aria-label="First">
                                    <span aria-hidden="true">&laquo;&laquo;</span>
                                </a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/files(page=${currentPage - 1}, size=10, sort=${sort}, direction=${direction}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}" aria-label="Previous">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, filesPage.totalPages - 1)}"
                                th:if="${i >= currentPage - 2 && i <= currentPage + 2}"
                                th:classappend="${i == currentPage ? 'active' : ''}">
                                <a class="page-link" th:href="@{/files(page=${i}, size=10, sort=${sort}, direction=${direction}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}" th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == filesPage.totalPages - 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/files(page=${currentPage + 1}, size=10, sort=${sort}, direction=${direction}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}" aria-label="Next">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == filesPage.totalPages - 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/files(page=${filesPage.totalPages - 1}, size=10, sort=${sort}, direction=${direction}, search=${search}, status=${status}, startDate=${startDate}, endDate=${endDate})}" aria-label="Last">
                                    <span aria-hidden="true">&raquo;&raquo;</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    
    <th:block layout:fragment="scriptAdditions">
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/en.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Initialize date picker
                flatpickr(".date-range", {
                    enableTime: true,
                    dateFormat: "Y-m-d'T'H:i:S",
                    time_24hr: true,
                    locale: "en"
                });
            });
        </script>
    </th:block>
</body>
